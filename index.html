<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Firefox Engine Mock</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="firefox-ui">

  <div class="tab-bar">
    <div class="tabs" id="tabs"></div>
    <img src="icons/newtab.png" class="icon-btn" id="newTab">
  </div>

  <div class="nav-bar">
    <img src="icons/back.png" class="icon-btn" id="backBtn">
    <img src="icons/forward.png" class="icon-btn" id="forwardBtn">
    <img src="icons/reload.png" class="icon-btn" id="reloadBtn">

    <div class="address-container">
      <img src="icons/lock.png" class="lock-icon">
      <input type="text" id="addressBar">
    </div>

    <div class="nav-right">
      <img src="icons/dark.png" class="icon-btn" id="themeToggle">
      <img src="icons/fullscreen.png" class="icon-btn" id="fullscreenBtn">
    </div>
  </div>

</div>

<div class="page-content" id="pageContent">
  <h1>Home</h1>
  <p>Scroll this page. Each tab remembers its scroll.</p>
  <div style="height:2000px"></div>
</div>

<script src="script.js"></script>
</body>
</html>
