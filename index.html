<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interactive Firefox Mock</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="firefox-ui">

  <!-- TAB BAR -->
  <div class="tab-bar">
    <div class="tabs" id="tabs"></div>
    <div class="new-tab" id="newTab">+</div>
  </div>

  <!-- NAV BAR -->
  <div class="nav-bar">
    <div class="nav-buttons">
      <span class="nav-btn">←</span>
      <span class="nav-btn">→</span>
      <span class="nav-btn">⟳</span>
    </div>

    <div class="address-container">
      🔒 <input type="text" value="https://example.com" readonly>
    </div>

    <div class="nav-right">
      <button id="themeToggle">🌙</button>
      <button id="fullscreenBtn">⛶</button>
    </div>
  </div>

</div>

<div class="page-content">
  <h1>Fake Firefox UI</h1>
  <p>All tabs load this same page.</p>
</div>

<script src="script.js"></script>
</body>
</html>
