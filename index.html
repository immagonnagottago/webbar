<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Firefox Mock</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="firefox-ui">

  <!-- TAB BAR -->
  <div class="tab-bar">
    <div class="tab active">
      <span class="tab-title">example.com</span>
    </div>
    <div class="new-tab">+</div>
  </div>

  <!-- NAV BAR -->
  <div class="nav-bar">
    <div class="nav-buttons">
      <span class="nav-btn">←</span>
      <span class="nav-btn">→</span>
      <span class="nav-btn">⟳</span>
    </div>

    <div class="address-container">
      <span class="lock">🔒</span>
      <input type="text" value="https://example.com" readonly>
    </div>

    <div class="nav-right">
      <span class="ext">⋯</span>
      <div class="profile"></div>
    </div>
  </div>

</div>

<div class="page-content">
  <h1>Fake Firefox Tab</h1>
  <p>This is a realistic Firefox-style browser UI.</p>
</div>

</body>
</html>
